{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centraltur Viagens — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
  <div class="text-center mb-6">
    <div class="text-2xl font-bold text-blue-700">Centraltur Viagens</div>
    <div class="text-sm text-gray-500 mt-1">{% trans "Painel de Administração" %}</div>
  </div>

  {% if form.errors %}
  <div class="mb-4 px-4 py-3 rounded-md bg-red-50 text-red-700 text-sm border border-red-200">
    {% trans "Usuário ou senha incorretos." %}
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Usuário" %}</label>
        <input type="text" name="username" autofocus required
          class="block w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "Senha" %}</label>
        <input type="password" name="password" required
          class="block w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="mt-6 w-full py-2.5 bg-blue-600 text-white rounded-lg font-semibold text-sm hover:bg-blue-700 transition">
      {% trans "Entrar" %}
    </button>
  </form>

  <div class="mt-4 text-center">
    <a href="/" class="text-xs text-gray-400 hover:text-blue-500">← {% trans "Voltar ao Terminal" %}</a>
  </div>
</div>
</body>
</html>
